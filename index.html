<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tic Tac Toe Game</title>
    <meta
      name="description"
      content="Play interactive Tic Tac Toe game online"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Fredoka:wght@600;700&family=Poppins:wght@400;600&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./tictactoe.css" />
  </head>
  <body>
    <main>
      <h1>Welcome to Tic-Tac-Toe Game</h1>
      <div class="container">
        <img
          src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcSipu4SOLN1SWlciJjoqe8Fvrvj6HMphuzMIg&s"
          class="undo"
          alt="Undo"
        />
        <div class="game">
          <button id="b1" class="box"></button>
          <button id="b2" class="box"></button>
          <button id="b3" class="box"></button>
          <button id="b4" class="box"></button>
          <button id="b5" class="box"></button>
          <button id="b6" class="box"></button>
          <button id="b7" class="box"></button>
          <button id="b8" class="box"></button>
          <button id="b9" class="box"></button>
        </div>
      </div>
      <button id="reset">Reset</button>
    </main>
    <footer class="footer">
      <div class="footer-container">
        <p class="footer-text">
          🚀 Developed by <span>Manishankar Kanrar</span> © 2026
        </p>

        <a
          href="https://www.linkedin.com/in/manishankar-kanrar/"
          target="_blank"
          class="linkedin-link"
        >
          <img
            src="https://img.icons8.com/color/96/linkedin.png"
            alt="LinkedIn"
            class="linkedin-icon"
          />
        </a>
      </div>
    </footer>
    <script src="./tictactoe.js"></script>
  </body>
</html>
